<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <title>PPM Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        /* المقاس الاستاندرد لكروت الأجهزة 9cm x 5.5cm */
        .card-container {
            width: 90mm;
            height: 55mm;
            background-color: #ffffff;
            border: 2px solid #1a5276; /* لون أزرق مقارب لتجمع تبوك */
            border-radius: 8px;
            padding: 5mm;
            box-sizing: border-box;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #a6192e; /* لون أحمر مقارب لـ FGC */
            padding-bottom: 4px;
            margin-bottom: 6px;
        }
        .logo-box {
            height: 18px;
            width: auto;
            max-width: 35%;
        }
        .logo-box img {
            height: 100%;
            object-fit: contain;
        }
        .title {
            text-align: center;
            font-weight: bold;
            font-size: 11px;
            color: #333;
            line-height: 1.2;
        }
        .content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 4px;
        }
        .row {
            display: flex;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
            color: #000;
        }
        .row span.label {
            width: 85px; /* لتثبيت بداية النقط */
        }
        .row span.dots {
            flex-grow: 1;
            border-bottom: 1.5px dotted #666;
            margin-left: 5px;
            height: 14px;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="header">
            <div class="logo-box">
                <img src="FGC.jpeg" alt="FGC Logo">
            </div>
            <div class="title">
                PREVENTIVE MAINTENANCE<br>
                صيانة وقائية
            </div>
            <div class="logo-box">
                <img src="TabukCluster (1).jpeg" alt="Tabuk Cluster Logo">
            </div>
        </div>

        <div class="content">
            <div class="row">
                <span class="label">Control Num:</span>
                <span class="dots"></span>
            </div>
            <div class="row">
                <span class="label">PPM Date:</span>
                <span class="dots"></span>
            </div>
            <div class="row">
                <span class="label">Next PPM:</span>
                <span class="dots"></span>
            </div>
            <div class="row">
                <span class="label">By:</span>
                <span class="dots"></span>
            </div>
        </div>
    </div>

</body>
</html>
